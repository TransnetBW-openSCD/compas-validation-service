quarkus.http.port=8080
quarkus.application.name=compas-validation-service

quarkus.http.body.handle-file-uploads=true
quarkus.http.limits.max-body-size=600M
quarkus.resteasy.multipart.max-file-size=500M

quarkus.http.cors.enabled=false

quarkus.http.auth.permission.allow-quarkus-services.paths=/q/health/live,/q/health/ready,/q/openapi
quarkus.http.auth.permission.allow-quarkus-services.policy=permit

# permit all for local dev
quarkus.http.auth.permission.SCL_VALIDATION_POST.paths=/api/v1/validate
quarkus.http.auth.permission.SCL_VALIDATION_POST.policy=permit-all
quarkus.http.auth.permission.SCL_VALIDATION_POST.methods=POST