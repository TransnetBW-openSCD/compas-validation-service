name: Build and Deploy Validation Service

on:
  push:
    branches:
      - main
      - features/*
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Create Maven Settings
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: '[{ "id": "github", "username": "OWNER", "password": "${{ secrets.GITHUB_TOKEN }}" }]'

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short ${{ github.sha }})
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_ENV

      - name: Build and Test with Maven
        run: mvn verify -B

      # - name: Login to Azure Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: compasacr.azurecr.io
      #     username: CompasAcr
      #     password: ${{ secrets.AZURE_GITHUB_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: false
          tags: compasacr.azurecr.io/bearingpoint/compas/compas-validation-service:${{ env.COMMIT_SHORT_SHA }}