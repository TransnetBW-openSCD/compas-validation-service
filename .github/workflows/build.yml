name: Build and Deploy Validation Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Create Maven Settings
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: '[{ "id": "github", "username": "OWNER", "password": "${{ secrets.GITHUB_TOKEN }}" }]'

      - name: Build and Test with Maven
        run: mvn verify -B

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-app
          path: app/target/quarkus-app

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - name: Checkout published-artifacts Branch
        uses: actions/checkout@v4.1.4
        with:
          ref: published-artifacts

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: quarkus-app
          path: quarkus-app

      - name: Copy Built Files to Artifacts Folder
        run: |
          mkdir -p compas/validation-service
          cp -r quarkus-app/* compas/validation-service

      - name: Commit and Push Changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add compas/validation-service
          git commit -m "Deploy latest build to validation-service" || echo "No changes to commit"
          git push origin published-artifacts
